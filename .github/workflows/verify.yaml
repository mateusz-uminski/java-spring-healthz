name: verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'  # Adjust this to your desired Java version

      - run: ./gradlew build --no-daemon

      - run: ./gradlew test

